version: "3.9"

services:
  server:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://autocreat:autocreat@postgres:5432/autocreat?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-production
      JWT_REFRESH_SECRET: change-me-refresh-in-production
      PORT: "8080"
      ENV: production
      DB_CONNECT_RETRIES: "10"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: autocreat
      POSTGRES_PASSWORD: autocreat
      POSTGRES_DB: autocreat
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autocreat"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
