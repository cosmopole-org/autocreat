name: Flutter Android - Build APK

on:
  push:
    branches: [main, master]
    paths:
      - 'client/**'
      - '.github/workflows/flutter-android.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'client/**'
      - '.github/workflows/flutter-android.yml'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Build type (debug/release)'
        required: false
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Ensure Android platform files exist
        working-directory: client
        run: flutter create --platforms=android --org io.autocreat --no-pub .

      - name: Get Flutter dependencies
        working-directory: client
        run: flutter pub get

      - name: Patch quill_native_bridge_windows (GMEM_MOVEABLE → GMEM_MOVABLE)
        run: |
          find "$HOME/.pub-cache" -path "*/quill_native_bridge_windows-*/lib/quill_native_bridge_windows.dart" \
            -exec sed -i 's/GMEM_MOVEABLE/GMEM_MOVABLE/g' {} +

      - name: Run Flutter code generation
        working-directory: client
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Set up signing keystore (release only)
        if: github.event.inputs.release_type == 'release' || github.event_name == 'push'
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > client/android/app/release.jks
            cat > client/android/key.properties << EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=release.jks
          EOF
          fi

      - name: Build APK (release)
        working-directory: client
        run: |
          flutter build apk \
            --release \
            --dart-define=API_BASE_URL=${{ vars.API_BASE_URL || 'https://autocreat-api.vercel.app' }} \
            --split-per-abi

      - name: Build APK (universal, debug fallback)
        if: failure()
        working-directory: client
        run: flutter build apk --debug

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autocreat-apk-${{ github.sha }}
          path: |
            client/build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: client/build/app/outputs/flutter-apk/*.apk
          name: AutoCreat ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
