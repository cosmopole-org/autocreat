name: Flutter Web - Build & Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    paths:
      - 'client/**'
      - '.github/workflows/flutter-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.event_name == 'push' && 'deploy' || github.ref }}"
  cancel-in-progress: false

jobs:
  build:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Ensure Web platform files exist
        working-directory: client
        run: flutter create --platforms=web --org io.autocreat --no-pub .

      - name: Get Flutter dependencies
        working-directory: client
        run: flutter pub get

      - name: Run Flutter code generation
        working-directory: client
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run Flutter analyzer
        working-directory: client
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Flutter Web (release)
        working-directory: client
        run: |
          flutter build web \
            --release \
            --base-href "/autocreat/" \
            --dart-define=API_BASE_URL=${{ vars.API_BASE_URL || 'https://autocreat-api.vercel.app' }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/build/web

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
