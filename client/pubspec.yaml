name: autocreat
description: AutoCreat - Organizational System Builder
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.4.1
  go_router: ^14.2.0
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  flutter_quill: ^10.8.3
  fl_chart: ^0.68.0
  data_table_2: 2.5.12
  shimmer: ^3.0.0
  badges: ^3.1.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.19.0
  uuid: ^4.4.0
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  percent_indicator: ^4.2.3
  flutter_colorpicker: ^1.1.0
  dotted_border: ^2.1.0
  cached_network_image: ^3.4.1
  web_socket_channel: ^3.0.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

